# ===========================================================
# Iron Ridge Intelligent Sales Workflow — Docker Compose
# Development environment only.
# Production uses Supabase (external DB) and Docker deploy.
# ===========================================================

version: "3.9"

services:

  # -------------------------------------------------------
  # FastAPI Backend
  # -------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ironridge-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - N8N_WEBHOOK_BASE_URL=${N8N_WEBHOOK_BASE_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ironridge-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; p=os.environ.get('PORT','8000'); r=urllib.request.urlopen(f'http://localhost:{p}/health', timeout=5); exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------
  # Redis (optional caching and rate limiting)
  # -------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: ironridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ironridge-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# -------------------------------------------------------
# Note: PostgreSQL is NOT included here.
# We connect to Supabase (external cloud database).
# Set DATABASE_URL in .env to your Supabase connection string.
# -------------------------------------------------------

networks:
  ironridge-net:
    driver: bridge

volumes:
  redis_data:
