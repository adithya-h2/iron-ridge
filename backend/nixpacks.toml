# Railway Nixpacks build config (builder = NIXPACKS in railway.toml)
# slack-sdk AsyncWebClient requires aiohttp; install explicitly and verify at build time.

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "pip install aiohttp==3.13.2",
  "python -c \"import aiohttp; from slack_sdk.web.async_client import AsyncWebClient\"",
]
