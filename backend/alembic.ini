# alembic.ini
# Alembic configuration for Iron Ridge Intelligent Sales Workflow.
# Note: The actual database URL is read from environment variables in env.py,
# NOT from this file. The sqlalchemy.url below is overridden at runtime.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Overridden in migrations/env.py — do not put real credentials here
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic,asyncpg

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_asyncpg]
level = WARN
handlers =
qualname = asyncpg

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
