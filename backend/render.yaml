# Render Blueprint — set Root Directory to backend in dashboard if using monorepo
services:
  - type: web
    name: iron-ridge-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_API_DOCS
        value: "true"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AGENT_API_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
